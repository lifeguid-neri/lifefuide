<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LifeGuide</title>
<style>
body{margin:0;font-family:Arial;direction:rtl;background:#0b1220;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{background:#0f1b33;border:1px solid rgba(255,255,255,.15);padding:24px;border-radius:16px;width:min(820px,92vw);text-align:center}
h1{margin:0 0 10px;font-size:40px}
h2{margin:0 0 18px;font-size:22px;color:#c9d6f2}
.row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:12px 0}
button{padding:12px 16px;border-radius:12px;border:0;cursor:pointer;font-size:18px;background:#2d6cdf;color:#fff}
button:hover{opacity:.92}
#result{margin-top:18px;font-size:22px;font-weight:700}
#why{margin-top:10px;font-size:16px;line-height:1.7;color:#c9d6f2}
.box{margin-top:18px;padding:14px;border-radius:14px;background:rgba(255,255,255,.06)}
input{width:min(520px,90%);padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.2);color:#fff;font-size:16px}
.small{margin-top:12px;color:#9fb2da;font-size:12px}
</style>
</head>
<body>
<div class="card">
<h1>LifeGuide</h1>
<h2>מה חשוב לך עכשיו?</h2>

<div class="row">
<button onclick="pick('fun')">כיף</button>
<button onclick="pick('sport')">תנועה</button>
<button onclick="pick('rest')">מנוחה</button>
</div>

<div class="box">
<div style="font-size:18px;margin-bottom:10px;">🧠 שאל את LifeGuide</div>
<input id="userInput" placeholder="לדוגמה: אני עייף / עצבני / בודד / משועמם" />
<div class="row" style="margin-top:10px;">
<button onclick="sendMessage()">שלח</button>
<button onclick="clearChat()">נקה</button>
</div>
<div id="chatAnswer" style="margin-top:12px;color:#c9d6f2;line-height:1.7;"></div>
</div>

<div id="result"></div>
<div id="why"></div>

<div class="small">LifeGuide v3</div>
</div>

<script>
function pick(type){
if(type==="fun"){
document.getElementById("result").innerText = "כיף 😄: 10 דקות משהו קצר וכיפי.";
document.getElementById("why").innerText =
"מדעית: כיף קצר יכול לשחרר דופמין במוח (קשור להנאה ומוטיבציה). טיימר עוזר ליהנות בלי להיתקע הרבה זמן.";
}
if(type==="sport"){
document.getElementById("result").innerText = "תנועה 💪: 10 דקות הליכה/כדור/תרגילים.";
document.getElementById("why").innerText =
"מדעית: תנועה מעלה זרימת דם וחמצן למוח ומשחררת אנדורפינים (מורידים לחץ). זה יכול לשפר ריכוז לזמן קצר אחרי פעילות.";
}
if(type==="rest"){
document.getElementById("result").innerText = "מנוחה 😌: 3–5 דקות נשימה איטית בלי מסך.";
document.getElementById("why").innerText =
"מדעית: נשימה איטית מפעילה מערכת עצבים מרגיעה ויכולה להוריד דופק ולחץ, ולעזור למוח להתאפס.";
}
}

function sendMessage(){
var text = (document.getElementById("userInput").value || "").toLowerCase();
var answer = "ספר לי עוד קצת, ואני אנסה לעזור.";

if(text.includes("עייף")){
answer = "עייפות: לפעמים
}



document.getElementById("chatAnswer").innerText = answer;

}

</script>



</body>

</html>
