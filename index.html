<!doctype html>

<html lang="he" dir="rtl">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>LifeGuide</title>

  <style>

    body{

      margin:0;

      font-family:Arial,sans-serif;

      background:#0b1220;

      color:white;

      display:flex;

      justify-content:center;

      align-items:center;

      min-height:100vh;

    }



    .card{

      width:min(900px,92vw);

      background:#13203a;

      border-radius:20px;

      padding:24px;

      box-shadow:0 10px 30px rgba(0,0,0,0.35);

      text-align:center;

    }



    h1{

      margin-top:0;

      font-size:42px;

    }



    h2{

      color:#c8d6f0;

      font-size:24px;

      margin-bottom:18px;

    }



    .buttons{

      display:flex;

      justify-content:center;

      gap:12px;

      flex-wrap:wrap;

      margin-bottom:18px;

    }



    button{

      background:#2f6fed;

      color:white;

      border:none;

      border-radius:14px;

      padding:12px 18px;

      font-size:18px;

      cursor:pointer;

    }



    button:hover{

      opacity:0.92;

    }



    .resultBox{

      margin-top:20px;

      padding:18px;

      border-radius:16px;

      background:rgba(255,255,255,0.06);

      min-height:120px;

    }



    #result{

      font-size:24px;

      font-weight:bold;

      margin-bottom:12px;

    }



    #why{

      font-size:17px;

      line-height:1.7;

      color:#d7e3ff;

    }



    .chatBox{

      margin-top:28px;

      padding:18px;

      border-radius:16px;

      background:rgba(255,255,255,0.06);

    }



    input{

      width:min(600px,90%);

      padding:12px;

      border-radius:12px;

      border:1px solid rgba(255,255,255,0.2);

      background:#0b1220;

      color:white;

      font-size:16px;

    }



    #chatAnswer{

      margin-top:14px;

      font-size:17px;

      line-height:1.7;

      color:#d7e3ff;

      min-height:40px;

    }



    .small{

      margin-top:16px;

      color:#9fb2da;

      font-size:13px;

    }

  </style>

</head>

<body>

  <div class="card">

    <h1>LifeGuide</h1>

    <h2>מה חשוב לך עכשיו?</h2>



    <div class="buttons">

      <button onclick="pick('fun')">כיף 😄</button>

      <button onclick="pick('sport')">תנועה 💪</button>

      <button onclick="pick('rest')">מנוחה 😌</button>

    </div>



    <div class="resultBox">

      <div id="result">בחר משהו למעלה</div>

      <div id="why">כאן יופיע הסבר מדעי פשוט וברור.</div>

    </div>



    <div class="chatBox">

      <h2>🧠 שאל את LifeGuide</h2>

      <input id="userInput" type="text" placeholder="למשל: אני עייף / עצבני / בודד / משועמם" />

      <div class="buttons" style="margin-top:12px;">

        <button onclick="sendMessage()">שלח</button>

        <button onclick="clearChat()">נקה</button>

      </div>

      <div id="chatAnswer"></div>

    </div>



    <div class="small">LifeGuide v4</div>

  </div>



  <script>

    function pick(type){

      var result = document.getElementById("result");

      var why = document.getElementById("why");



      if(type === "fun"){

        result.innerText = "כיף 😄: 10 דקות משהו קצר וכיפי";

        why.innerText = "מדעית: פעילות כיפית יכולה לעזור לשחרר דופמין במוח. דופמין קשור להנאה, מוטיבציה ורצון להתחיל משהו. לכן כיף קצר יכול לשפר מצב רוח בלי לשקוע יותר מדי זמן.";

      }



      if(type === "sport"){

        result.innerText = "תנועה 💪: 10 דקות הליכה / כדור / תרגילים";

        why.innerText = "מדעית: תנועה מעלה זרימת דם וחמצן למוח, ועוזרת לשחרר אנדורפינים. אנדורפינים יכולים להפחית לחץ ולעזור להרגיש יותר ערני ומרוכז.";

      }



      if(type === "rest"){

        result.innerText = "מנוחה 😌: 3–5 דקות נשימה איטית בלי מסך";

        why.innerText = "מדעית: נשימה איטית מפעילה את מערכת העצבים המרגיעה. זה יכול לעזור להוריד דופק ולחץ, ולתת למוח רגע של התאפסות.";

      }

    }



    function sendMessage(){

      var text = document.getElementById("userInput").value.toLowerCase().trim();

      var answer = "ספר לי עוד קצת, ואני אנסה לעזור.";



      if(text.includes("עייף")){

        answer = "עייפות: לפעמים המוח והגוף צריכים הפסקה קצרה, מים, או תנועה קלה. מדעית, תנועה קצרה יכולה לעזור לזרימת הדם ולערנות.";

      }

      else if(text.includes("עצבני")){

        answer = "עצבים: כשכועסים, הגוף נכנס למצב סטרס. מדעית, נשימה איטית או הליכה קצרה יכולות לעזור להרגיע את מערכת העצבים.";

      }

      else if(text.includes("בודד") || text.includes("לבד")){

        answer = "בדידות: לפעמים שיחה קצרה עם מישהו קרוב או יציאה החוצה עוזרת. מדעית, קשר חברתי יכול לעזור למצב הרוח ולהפחית תחושת לחץ.";

      }

      else if(text.includes("משועמם")){

        answer = "שעמום: המוח מחפש גירוי חדש. מדעית, פעילות יצירתית, משחק קצר או תנועה יכולים להפעיל מערכות של עניין ומוטיבציה.";

      }

      else if(text.includes("עצוב")){

        answer = "עצב: לפעמים עוזר לעצור רגע, לנשום, ולדבר עם מישהו שאתה סומך עליו. מדעית, שיתוף רגשות יכול להפחית עומס רגשי.";

      }

      else if(text.includes("לחוץ") || text.includes("מתח")){

        answer = "לחץ: כשיש מתח, הגוף עובד חזק יותר. מדעית, נשימות עמוקות, הפסקה קצרה, או הליכה של כמה דקות יכולות לעזור להרגיע את הגוף.";

      }

      else if(text.includes("מפחד") || text.includes("פחד")){

        answer = "פחד: פחד מפעיל את מערכת ההגנה של הגוף. מדעית, נשימה איטית ושיחה עם מבוגר שאתה סומך עליו יכולות לעזור להחזיר תחושת ביטחון.";

      }

      else if(text.includes("אין לי כוח")){

        answer = "כשאין כוח, לפעמים הכי טוב להתחיל ממש קטן: לקום, לשתות מים, ולזוז דקה אחת. מדעית, התחלה קטנה יכולה לעזור למוח לצאת מקיפאון.";

      }



      document.getElementById("chatAnswer").innerText = answer;

    }



    function clearChat(){

      document.getElementById("userInput").value = "";

      document.getElementById("chatAnswer").innerText = "";

    }

  </script>

</body>

</html>
